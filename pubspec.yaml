name: freshcart
description: A full-featured online grocery shopping app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  cached_network_image: ^3.3.1
  flutter_carousel_widget: ^2.3.0
  shimmer: ^3.0.0
  overlay_support: ^2.1.0

  # Image upload
  image_picker: ^1.0.7

  # Utils
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
